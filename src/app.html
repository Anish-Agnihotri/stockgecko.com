<!doctype html>
<html lang="en" class="overscroll-none">
	<head>
		<!-- General -->
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, height=device-height"
		/>

		<!-- Favicon -->
		<link rel="icon" href="%sveltekit.assets%/assets/brand/favicon.svg" />

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap"
			rel="stylesheet"
		/>

		<!-- Inject Svelte head -->
		%sveltekit.head%
	</head>

	<body
		data-sveltekit-preload-data="hover"
		class="bg-black font-display text-gecko-gray tabular-nums"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
