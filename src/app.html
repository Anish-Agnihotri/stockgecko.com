<!doctype html>
<html lang="en">
	<head>
		<!-- General -->
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, height=device-height"
		/>

		<!-- Favicon -->
		<link rel="icon" href="%sveltekit.assets%/assets/favicon.svg" />

		<!-- Inject Svelte head -->

	<body data-sveltekit-preload-data="hover">

	</body>
</html>
